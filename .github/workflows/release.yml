name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # No password secret — key was generated with empty password. Tauri CLI defaults to empty.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WinMux ${{ github.ref_name }}"
          releaseBody: |
            ## WinMux ${{ github.ref_name }}

            Terminal multiplexer for Windows, built for AI coding agents.

            ### Installation
            Download the `.msi` installer below and run it. WinMux will be added to your Start Menu.
            Existing installs will auto-update.

            ### What's New
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build CLI binary
        working-directory: src-tauri
        run: cargo build --release --bin winmux-cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: winmux-cli-windows-x86_64
          path: src-tauri/target/release/winmux-cli.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/winmux-cli.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
